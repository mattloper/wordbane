<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, interactive-widget=resizes-content" />
  <title>Wordbane</title>
  <style>
    :root {
      --bg: #1c1f2b; --panel: #292b3b; --select: #ffdb4d; --muted: #8c8fa3;
      --text: #d9deed; --danger: #f7666b; --tile: #383b4d; --tile-rare: #4d4224;
      --hit-enemy: #fff28c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    #app { max-width: 780px; margin: 0 auto; padding: 18px; }
    .panel { background: var(--panel); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .muted { color: var(--muted); }
    .row { display: flex; align-items: center; gap: 12px; }
    button {
      font: inherit; font-size: 16px; color: var(--text); background: #3d4050;
      border: 1px solid var(--muted); border-radius: 6px; padding: 8px 16px; cursor: pointer;
    }
    button:hover { filter: brightness(1.12); }
    button.primary { background: var(--select); color: #1c1c26; border: none; font-weight: 600; }
    button:disabled { opacity: .55; cursor: default; filter: none; }
    button.ghost { background: transparent; }

    /* header */
    header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
    header .title { color: var(--muted); font-size: 15px; }
    #chapter { color: var(--select); font-size: 28px; font-weight: 700; }
    #score { font-size: 18px; }
    #menu-wrap { position: relative; display: flex; align-items: center; gap: 10px; }
    #menu-btn { background: transparent; border: none; color: var(--text); font-size: 22px;
      line-height: 1; padding: 2px 6px; cursor: pointer; }
    #menu { position: absolute; top: 120%; right: 0; z-index: 50; min-width: 150px;
      background: var(--panel); border: 1px solid var(--muted); border-radius: 8px; padding: 6px;
      display: flex; flex-direction: column; gap: 2px; }
    #menu button { background: transparent; border: none; color: var(--text); text-align: left;
      padding: 8px 12px; border-radius: 6px; font-size: 15px; cursor: pointer; }
    #menu button:hover { background: #3d4050; }

    /* enemy */
    #enemy-head { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    #enemy-row { display: flex; gap: 16px; align-items: flex-start; }
    #portrait-holder { position: relative; width: 150px; height: 150px; flex: none;
      display: flex; align-items: center; justify-content: center; }
    #portrait { font-size: 110px; line-height: 1; transition: transform .15s; }
    #portrait-img { position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; transition: transform .15s; }
    .bonk { position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; font-size: 60px; line-height: 1; pointer-events: none;
      z-index: 5; will-change: transform, opacity; }
    .boon .art { width: 96px; height: 96px; object-fit: contain; }
    #atk-badge { position: absolute; top: 2px; left: 2px; background: #8c2224e0;
      color: #fff2ee; border-radius: 7px; padding: 1px 8px; font-size: 20px; font-weight: 700; }
    #enemy-text { flex: 1; min-width: 0; }
    #sentence { font-size: 20px; margin-bottom: 10px; line-height: 1.5; }
    #sentence .weapon { color: var(--danger); }
    #sentence .plain { color: var(--muted); }
    .hpbar { flex: 1; height: 16px; background: #00000055; border-radius: 8px; overflow: hidden; }
    .hpbar > i { display: block; height: 100%; transition: width .4s cubic-bezier(.3,.7,.3,1); }
    #enemy-hpfill { background: #e66b6b; }
    #you-hpfill { background: #5fb06a; }
    #letters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tile { width: 40px; text-align: center; }
    .tile .box { background: var(--tile); border-radius: 6px; padding: 5px 0;
      border: 2px solid transparent; }
    .tile.hot .box { background: var(--tile-rare); border-color: var(--select); }
    .tile .glyph { font-size: 22px; font-weight: 600; }
    .tile.hot .glyph { color: var(--select); }
    .tile .pts { font-size: 11px; color: var(--muted); }
    .tile.hot .pts { color: var(--select); }
    .tile .bar { height: 3px; margin-top: 2px; border-radius: 2px; background: var(--hit-enemy); visibility: hidden; }
    .tile.used .bar { visibility: visible; }

    /* action */
    #action-line { text-align: center; min-height: 22px; margin-bottom: 8px; }
    #controls { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    #dmg-box { width: 64px; text-align: center; }
    #dmg { font-size: 34px; color: var(--select); font-weight: 700; line-height: 1; }
    #dmg-cap { font-size: 10px; color: var(--muted); }
    #entry { font: inherit; font-size: 18px; padding: 8px 12px; width: 260px; max-width: 55vw;
      background: #14161f; color: var(--text); border: 1px solid var(--muted); border-radius: 6px; }
    #boons { display: flex; gap: 10px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
    .boon { width: 150px; height: 150px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; text-align: center; }
    .boon .emoji { font-size: 56px; line-height: 1; }
    .boon .label { font-weight: 600; }
    .boon .desc { font-size: 12px; color: var(--muted); }

    /* in-page keyboard — only shown on touch devices (JS adds body.touch), so the native
       on-screen keyboard never opens. On desktop this stays hidden and the physical
       keyboard drives the same input. */
    #kb { display: none; flex-direction: column; gap: 6px; margin-top: 8px; }
    body.touch #kb { display: flex; }
    #strike-touch { display: none; } /* the big touch-only Strike button (see mobile block) */
    body.touch #strike-touch { display: block; }
    body.touch #strike { display: none; } /* replaced by #strike-touch on touch */
    .kb-row { display: flex; gap: 5px; justify-content: center; }
    .key { flex: 1 1 0; min-width: 0; height: 46px; padding: 0; font: inherit; font-size: 18px;
      font-weight: 600; color: var(--text); background: #3d4050; border: 1px solid #4a4d60;
      border-radius: 6px; user-select: none; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; }
    .key.key-wide { flex: 1.5 1 0; font-size: 16px; }
    .key:active { background: var(--select); color: #1c1c26; border-color: var(--select); }

    /* you */
    #log { min-height: 84px; font-size: 13px; color: #ccd; white-space: pre-line; }
    #spent { background: transparent; border: none; color: var(--muted); font-size: 13px;
      padding: 0; cursor: pointer; text-decoration: underline dotted; white-space: nowrap; }
    #spent:hover { color: var(--text); }
    #used-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
      max-height: 50vh; overflow-y: auto; margin-top: 14px; }
    #used-list .word { background: var(--tile); border-radius: 6px; padding: 3px 10px; font-size: 15px; }

    /* Phone layout — a different experience from the desktop one. The on-screen keyboard
       covers the bottom of the screen, and iOS Safari doesn't shrink the page when it
       opens (only the *visible* area shrinks). So JS tracks window.visualViewport and
       sets --vvh / --vvt; we size the whole play screen to that visible box and lay it
       out as a fixed column: enemy + your HP at the top, the input pinned to the bottom
       right above the keyboard, nothing to scroll past. */
    @media (max-width: 640px) {
      html, body { height: 100%; overflow: hidden; }
      #app {
        position: fixed; top: var(--vvt, 0px); left: 0; right: 0;
        height: var(--vvh, 100dvh);
        max-width: none; margin: 0; padding: 8px 10px;
        display: flex; flex-direction: column; overflow: hidden;
      }
      #app > * { flex: 0 0 auto; } /* fixed-height rows; spacing comes from margins */
      header { margin-bottom: 6px; }
      #chapter { font-size: 20px; }
      .panel { padding: 9px; margin-bottom: 7px; }

      #enemy-panel { order: 1; }
      #portrait-holder { width: 78px; height: 78px; }
      #portrait { font-size: 58px; }
      .bonk { font-size: 42px; }
      /* the small portrait leaves no room for a corner badge — sit it under the monster */
      #atk-badge { top: calc(100% + 4px); left: 50%; bottom: auto; transform: translateX(-50%);
        font-size: 15px; padding: 1px 7px; white-space: nowrap; }
      #sentence { font-size: 15px; margin-bottom: 5px; line-height: 1.35; }
      #letters { margin-top: 7px; gap: 5px; }

      #you-panel { order: 2; margin-top: 0; }
      #boons { order: 3; margin-top: 10px; }
      /* big Strike fills the gap under your HP; margin-top:auto pushes it (and the input
         group below it) down toward the thumb */
      #strike-touch { order: 4; width: 100%; height: 58px; font-size: 20px; margin: auto 0 8px; }
      #action-line { order: 5; margin: 0 0 6px; min-height: 0; }
      #controls { order: 6; }
      #kb { order: 7; margin-top: 8px; }
      /* not worth the vertical space on a phone */
      #log-panel, #newrun-wrap { display: none; }

      /* long dialogs (How to play) can scroll instead of clipping */
      .overlay { align-items: flex-start; overflow-y: auto; }
    }

    /* overlays (z-index sits above the sticky enemy panel so menus/dialogs cover it) */
    .overlay { position: fixed; inset: 0; z-index: 100; background: #000000a8; display: none;
      align-items: center; justify-content: center; padding: 20px; }
    .overlay.show { display: flex; }
    .card { background: var(--panel); border-radius: 12px; padding: 28px; max-width: 460px;
      text-align: center; border: 2px solid var(--select); }
    .card.danger { border-color: var(--danger); }
    .card h1 { margin: 0 0 6px; }
    #title-card h1 { color: var(--select); font-size: 56px; letter-spacing: 2px; }
    #title-logo { width: 100%; max-width: 340px; display: block; margin: 0 auto 6px; }
    #gameover-card h1 { color: var(--danger); font-size: 48px; }
    .card p { color: var(--text); }
    .menu { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    .menu button { min-width: 220px; margin: 0 auto; }
    #rules-body { text-align: left; font-size: 15px; line-height: 1.5; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="title">Wordbane</div>
      <div id="chapter">CHAPTER 1</div>
      <div id="menu-wrap">
        <span id="score">SCORE 0</span>
        <button id="menu-btn" aria-label="Menu">☰</button>
        <div id="menu" class="hidden">
          <button id="menu-howto">How to play</button>
          <button id="menu-options">Options</button>
          <button id="menu-main">Main Menu</button>
        </div>
      </div>
    </header>

    <div class="panel" id="enemy-panel">
      <div id="enemy-head"></div>
      <div id="enemy-row">
        <div id="portrait-holder">
          <img id="portrait-img" class="hidden" alt="" />
          <div id="portrait">👾</div>
          <div id="atk-badge">⚔ 0</div>
        </div>
        <div id="enemy-text">
          <div id="sentence"></div>
          <div class="row">
            <div id="enemy-hplabel" style="font-size:16px"></div>
            <div class="hpbar"><i id="enemy-hpfill" style="width:100%"></i></div>
          </div>
          <div id="letters"></div>
        </div>
      </div>
    </div>

    <div id="action-line" class="muted"></div>
    <div id="controls">
      <div id="dmg-box"><div id="dmg">0</div><div id="dmg-cap">DMG</div></div>
      <input id="entry" placeholder="Try any word…" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button id="strike" class="primary">Strike</button>
      <button id="hint" class="hidden">Hint</button>
    </div>
    <button id="strike-touch" class="primary">Strike!</button>
    <div id="boons"></div>
    <div id="kb" aria-hidden="true"></div>

    <div class="panel" id="you-panel" style="margin-top:12px">
      <div class="muted" style="font-size:13px">YOU</div>
      <div class="row" style="margin-top:6px">
        <div id="you-hplabel" style="font-size:18px"></div>
        <div class="hpbar"><i id="you-hpfill" style="width:100%"></i></div>
        <button id="spent" title="See the words you’ve already used"></button>
      </div>
    </div>

    <div class="panel" id="log-panel"><div id="log"></div></div>
    <div id="newrun-wrap" style="text-align:center"><button id="newrun" class="ghost">New Run</button></div>
  </div>

  <!-- Title screen — shown by default so it paints instantly, before data loads -->
  <div id="title" class="overlay show">
    <div id="title-card" class="card">
      <img id="title-logo" class="hidden" alt="Wordbane" />
      <h1 id="title-text">WORDBANE</h1>
      <p class="muted">a letter-pool word battler</p>
      <p id="best" class="muted"></p>
      <div class="menu">
        <button id="play" class="primary" disabled>Loading…</button>
        <button id="howto" class="ghost">How to play</button>
        <button id="options" class="ghost">Options</button>
      </div>
    </div>
  </div>

  <!-- Options -->
  <div id="options-panel" class="overlay">
    <div class="card">
      <h1 style="color:var(--select);font-size:26px">Options</h1>
      <div style="text-align:left;margin-top:8px">
        <label for="style-select" class="muted" style="font-size:14px">Skin (art style)</label><br />
        <select id="style-select" style="font:inherit;font-size:16px;margin-top:6px;padding:6px 10px;
          background:#14161f;color:var(--text);border:1px solid var(--muted);border-radius:6px;width:100%"></select>
      </div>
      <div class="menu"><button id="options-close" class="primary">Done</button></div>
    </div>
  </div>

  <!-- How to play -->
  <div id="rules" class="overlay">
    <div class="card">
      <h1 style="color:var(--select);font-size:26px">How to play</h1>
      <div id="rules-body"></div>
      <div class="menu"><button id="rules-close" class="primary">Got it</button></div>
    </div>
  </div>

  <!-- Words spent -->
  <div id="used-panel" class="overlay">
    <div class="card">
      <h1 style="color:var(--select);font-size:26px">Words spent</h1>
      <p class="muted" style="font-size:13px;margin:4px 0 0">No word can be used twice in a run.</p>
      <div id="used-list"></div>
      <div class="menu"><button id="used-close" class="primary">Done</button></div>
    </div>
  </div>

  <!-- Game over -->
  <div id="gameover" class="overlay">
    <div id="gameover-card" class="card danger">
      <h1>GAME OVER</h1>
      <p id="gameover-stats" style="color:var(--select);font-size:18px"></p>
      <div class="menu row" style="flex-direction:row;justify-content:center">
        <button id="go-newrun" class="primary">New Run</button>
        <button id="go-menu" class="ghost">Main Menu</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/game.js"></script>
</body>
</html>
